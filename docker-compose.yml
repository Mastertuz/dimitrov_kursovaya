services:
  db:
    image: postgres:16-alpine
    container_name: kursach-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kursach
      POSTGRES_USER: kursach
      POSTGRES_PASSWORD: kursach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kursach -d kursach']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kursach-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://kursach:kursach@db:5432/kursach?schema=public
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: change-me-in-production
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-1282692}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-test_uhD9vp-0nxnhJvy_QndayMvYF7rw4DfC_2VncCr7LmU}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-http://localhost:3000/orders}
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123
    ports:
      - '${BACKEND_PORT:-54001}:4000'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kursach-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-54001}/api
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN}
    ports:
      - '3000:3000'

volumes:
  postgres_data: